services:
  - type: web
    runtime: node
    name: yuge-app
    region: singapore
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 24
      - key: OPENAI_MODEL
        value: gpt-4.1-mini
      - key: APP_BUILD
        value: render-blueprint
      - key: CORS_ORIGINS
        value: https://your-site.netlify.app
    disk:
      name: data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
